server:
  port: 8081

spring:
  application:
    name: auth-service
    version: 0.0.1
    doc:
      url: https://github.com/MCPutro
      description: project iseng-iseng
  datasource:
    url: jdbc:postgresql://localhost:1124/cobaah
    username: mcputro
    password: welcome1
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: identity
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    default-schema: identity
    create-schemas: true

# Spring doc
springdoc:
  swagger-ui:
    path: /
  packagesToScan: com.ecommerce.auth.controller

#${JWT_SECRET:your-secret-key-change-in-production-min-32-chars}
jwt:
  secret: cTF3NGQ1NGQ2NlM0UjdGNFNEVzVXRTRENFM0VzVFQTc
  expiration: 86400000
  refresh-expiration: 604800000

cors:
  allowed-origins: http://localhost:3000,http://localhost:5173
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

logging:
  level:
    com.ecommerce.auth: DEBUG
    org.springframework.security: DEBUG
